name: operational-web-app

x-api-build: &api-build
  context: .
  dockerfile: apps/api/Dockerfile

x-app-environment: &app-environment
  NODE_ENV: development
  DATABASE_URL: ${DATABASE_URL}
  DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL}
  REDIS_URL: ${REDIS_URL}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL}
  REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL}
  INVITE_TOKEN_TTL_SECONDS: ${INVITE_TOKEN_TTL_SECONDS}
  PASSWORD_RESET_TOKEN_TTL_SECONDS: ${PASSWORD_RESET_TOKEN_TTL_SECONDS}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_SECURE: ${SMTP_SECURE}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  MAIL_FROM: ${MAIL_FROM}
  EXPORT_DIR: ${EXPORT_DIR}
  CORS_ORIGINS: ${CORS_ORIGINS}
  APP_NAMESPACE: ${APP_NAMESPACE}

services:
  api:
    build: *api-build
    command: pnpm exec tsx src/index.ts
    env_file:
      - .env
    environment: *app-environment
    ports:
      - "${API_PORT}:4000"
    volumes:
      - exports:${EXPORT_DIR}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/readyz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - default
      - shared

  worker:
    build: *api-build
    command: pnpm exec tsx src/worker.ts
    env_file:
      - .env
    environment: *app-environment
    volumes:
      - exports:${EXPORT_DIR}
    networks:
      - default
      - shared

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    ports:
      - "${WEB_PORT}:3000"
    healthcheck:
      test: ["CMD", "node", "apps/web/healthcheck.mjs"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - default
      - shared

  mailhog:
    image: docker.io/mailhog/mailhog
    profiles:
      - dev
    ports:
      - "${MAILHOG_WEB_PORT}:8025"
      - "1025:1025"

volumes:
  exports:

networks:
  shared:
    external: true
    name: ${SHARED_NETWORK}
