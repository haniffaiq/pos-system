name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deploy-workflow-guardrails:
    name: validate deploy workflow guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy workflow guardrails
        run: |
          python3 - <<'PY'
          from pathlib import Path

          deploy = Path('.github/workflows/deploy.yml').read_text()
          required = [
              'secrets.DEPLOY_HOST',
              'secrets.DEPLOY_USER',
              'secrets.DEPLOY_KEY',
              'environment:',
              'concurrency:',
              'git ls-files --error-unmatch "$ENV_FILE"',
              'compose config --quiet',
              'Migration failed. Database rollback is intentionally not attempted',
              'rollback_app',
              'BILLING_ACTIVE_PSP',
              'Check deploy SSH configuration',
              "steps.deploy_config.outputs.configured == 'true'",
              'Manual deploys require DEPLOY_HOST, DEPLOY_USER, and DEPLOY_KEY',
          ]
          missing = [needle for needle in required if needle not in deploy]
          if missing:
              raise SystemExit(f'deploy.yml missing guardrails: {missing}')
          forbidden = ['DEPLOY_PASSWORD', 'export $(grep', 'set -x']
          present = [needle for needle in forbidden if needle in deploy]
          if present:
              raise SystemExit(f'deploy.yml contains unsafe patterns: {present}')
          PY

  verify:
    needs: deploy-workflow-guardrails
    name: verify build, tests, and Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: operational
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d operational"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mailhog:
        image: mailhog/mailhog
        ports:
          - 1025:1025
          - 8025:8025
    env:
      DATABASE_URL: postgres://app:app_password@localhost:5432/operational
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_access_secret_at_least_32_characters_long
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_32_characters_long
      ACCESS_TOKEN_TTL: "900"
      REFRESH_TOKEN_TTL: "2592000"
      INVITE_TOKEN_TTL_SECONDS: "604800"
      PASSWORD_RESET_TOKEN_TTL_SECONDS: "3600"
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      MAIL_FROM: operational-app-ci
      API_PORT: "4000"
      NEXT_PUBLIC_API_URL: http://localhost:4000
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      EXPORT_DIR: /tmp/pos-exports
      APP_NAMESPACE: ci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system clients
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Prepare database roles
        env:
          PGPASSWORD: postgres
        run: |
          psql "postgres://postgres:postgres@localhost:5432/operational" --set ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'app') THEN
              CREATE ROLE app LOGIN PASSWORD 'app_password' NOSUPERUSER NOBYPASSRLS;
            END IF;
          END
          $$;
          ALTER ROLE app WITH LOGIN PASSWORD 'app_password' NOSUPERUSER NOBYPASSRLS;
          ALTER DATABASE operational OWNER TO app;
          ALTER SCHEMA public OWNER TO app;
          GRANT ALL PRIVILEGES ON DATABASE operational TO app;
          GRANT ALL PRIVILEGES ON SCHEMA public TO app;
          SQL

      - name: Run database migrations
        run: pnpm migrate

      - name: Run unit and integration tests
        run: pnpm test

      - name: Check i18n catalog key coverage
        run: pnpm --filter @app/web i18n:check

      - name: Build API and web
        run: |
          pnpm --filter @app/api build
          pnpm --filter @app/web build

      - name: Install Playwright browsers
        run: pnpm --filter @app/e2e exec playwright install --with-deps chromium

      - name: Seed platform admins and plans for e2e
        run: |
          pnpm seed:admin admin@local admin123
          pnpm seed:admin admin@example.test admin123
          pnpm seed:plans

      - name: Start API, worker, and web
        env:
          RATE_LIMIT_DISABLED: "true"
        run: |
          mkdir -p "$EXPORT_DIR"
          AUTH_MFA_BYPASS_EMAILS='*' pnpm --filter @app/api exec tsx src/index.ts > /tmp/pos-api.log 2>&1 &
          pnpm --filter @app/api exec tsx src/worker.ts > /tmp/pos-worker.log 2>&1 &
          mkdir -p apps/web/.next/standalone/apps/web/.next/static
          cp -R apps/web/.next/static/. apps/web/.next/standalone/apps/web/.next/static/
          PORT=3000 HOSTNAME=0.0.0.0 node apps/web/.next/standalone/apps/web/server.js > /tmp/pos-web.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://localhost:4000/health >/dev/null && curl -fsS http://localhost:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo 'API log:'
          cat /tmp/pos-api.log || true
          echo 'Worker log:'
          cat /tmp/pos-worker.log || true
          echo 'Web log:'
          cat /tmp/pos-web.log || true
          exit 1

      - name: Run Playwright marketing home gate
        run: pnpm --filter @app/e2e test:marketing

      - name: Run Playwright Phase 1 gate
        run: pnpm --filter @app/e2e test:phase1

      - name: Seed grosir tenant
        id: seed_grosir
        run: |
          slug=$(bash e2e/seed-grosir.sh)
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "Seeded grosir tenant $slug"

      - name: Run Playwright Phase 2 gate
        env:
          E2E_GROSIR_SLUG: ${{ steps.seed_grosir.outputs.slug }}
        run: pnpm --filter @app/e2e test:phase2

      - name: Run Playwright Phase 3 responsive gate
        env:
          E2E_GROSIR_SLUG: ${{ steps.seed_grosir.outputs.slug }}
        run: pnpm --filter @app/e2e test:phase3

      - name: Run Playwright signup verification gate
        run: pnpm --filter @app/e2e test:signup

      - name: Run Playwright billing sandbox gate
        run: pnpm --filter @app/e2e test:billing

      - name: Run Playwright auth hardening gate
        run: pnpm --filter @app/e2e test:auth

      - name: Restart API with billing gates enabled
        env:
          AUTH_MFA_BYPASS_EMAILS: "*"
          BILLING_ENABLED: "true"
          RATE_LIMIT_DISABLED: "true"
        run: |
          pkill -f "tsx src/index.ts" || true
          for i in {1..10}; do
            if ! pgrep -f "tsx src/index.ts" >/dev/null; then
              break
            fi
            sleep 1
          done
          pkill -9 -f "tsx src/index.ts" || true
          pnpm --filter @app/api exec tsx src/index.ts > /tmp/pos-api-billing.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo 'API billing-enabled log:'
          cat /tmp/pos-api-billing.log || true
          exit 1

      - name: Seed quota tenants
        id: seed_quota
        run: |
          bash e2e/seed-quota.sh >> "$GITHUB_ENV"
          echo "Seeded quota e2e tenants"

      - name: Run Playwright quota gate
        run: pnpm --filter @app/e2e test:quota

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore
